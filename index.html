<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#c62828" />
    <meta name="description" content="نظام إدارة ناردين كافيه" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ناردين كافيه" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon-512.svg" />
    <title>Nardeen Caffe ☕</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Tajawal', 'Cairo', sans-serif; background: #0f0f1a; }
      #root { min-height: 100vh; }
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: linear-gradient(135deg, #8e0000, #c62828);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash svg { width: 100px; height: 100px; margin-bottom: 20px; animation: splashPop 0.6s ease; }
      #splash h1 { color: white; font-size: 28px; font-weight: 900; }
      #splash p  { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 6px; }
      #splash .dots { display: flex; gap: 8px; margin-top: 32px; }
      #splash .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: dotPulse 1.2s infinite; }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes dotPulse  { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="rgba(255,255,255,0.15)"/>
        <path d="M28 38 L34 66 Q36 72 42 72 L58 72 Q64 72 66 66 L72 38 Z" fill="rgba(255,255,255,0.9)"/>
        <path d="M66 48 Q80 48 80 56 Q80 64 66 64" stroke="rgba(255,255,255,0.8)" stroke-width="4" stroke-linecap="round" fill="none"/>
        <ellipse cx="50" cy="40" rx="22" ry="5" fill="rgba(109,58,31,0.5)"/>
        <path d="M38 30 Q40 24 38 18" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M50 27 Q52 20 50 14" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M62 30 Q64 24 62 18" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="50" cy="74" rx="26" ry="5" fill="rgba(255,255,255,0.25)"/>
      </svg>
      <h1>Nardeen Caffe</h1>
      <p>ناردين كافيه • بإدارة يحيى داؤود</p>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
        }, 1400);
        // كاشف التعليق: إذا بقيت الصفحة بيضاء (لم يُركّب التطبيق) بعد 8 ثوانٍ → زر إصلاح ذاتي
        setTimeout(() => {
          var root = document.getElementById('root');
          if (!root || root.children.length > 0) return;
          var sp = document.getElementById('splash'); if (sp) sp.remove();
          root.innerHTML =
            '<div dir="rtl" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center;font-family:Tajawal,Cairo,sans-serif;color:#fff;background:#0f0f1a">'
            + '<div style="font-size:42px">\u2615</div>'
            + '<h2 style="font-size:20px;font-weight:900">تعذّر تحميل التطبيق</h2>'
            + '<p style="opacity:.7;font-size:14px;max-width:320px">قد يكون التخزين المؤقّت قديمًا. تأكّد من الاتصال بالإنترنت ثم اضغط الزر.</p>'
            + '<button id="nc-fix" style="background:#c62828;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:700;font-family:inherit">إصلاح وإعادة التحميل</button>'
            + '</div>';
          document.getElementById('nc-fix').onclick = async function () {
            this.textContent = 'جارٍ الإصلاح…';
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map(function (r) { return r.unregister(); }));
              }
              if (window.caches) {
                var keys = await caches.keys();
                await Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }
            } catch (e) {}
            location.reload();
          };
        }, 8000);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
